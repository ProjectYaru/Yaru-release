name: Auto Update latest.json

on:
  release:
    types: [published]
  workflow_dispatch:
  schedule:
    - cron: "30 * * * *"

permissions:
  contents: write

jobs:
  update-latest-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Update latest.json from latest release
        run: ./scripts/update-latest-json.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- latest.json; then
            echo "No changes in latest.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "chore: auto-update latest.json"
          git push
